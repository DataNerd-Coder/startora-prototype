<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Ask Startora</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="ai-voice-screen">
          <div class="ai-mic-big">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 01-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          </div>
          <div class="ai-voice-label">Ask Startora</div>
          <div class="ai-voice-sub">Hold and speak your compliance question.<br>Release to get your answer.</div>
          <div class="ai-wave">
            <div class="ai-bar"></div><div class="ai-bar"></div><div class="ai-bar"></div>
            <div class="ai-bar"></div><div class="ai-bar"></div><div class="ai-bar"></div>
            <div class="ai-bar"></div>
          </div>
          <button class="ai-stop-btn" data-screen="ai-chat" onclick="nav('../app/ai-chat.html')">Done — see response</button>
          <div style="margin-top:16px;font-size:12px;opacity:.6;cursor:pointer" data-screen="ai-chat" onclick="nav('../app/ai-chat.html')">Switch to text instead</div>
          <div style="margin-top:28px" data-screen="dashboard" onclick="nav('../app/dashboard.html')"><div class="back-nav" style="color:rgba(255,255,255,.6)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</div></div>
        </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
