<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="flow-screen">
          <div class="flow-topnav">
            <button class="flow-back" data-screen="forgot-password" onclick="nav('../auth/forgot-password.html')" style="cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</button>
          </div>
          <div class="flow-body">
            <div class="flow-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <div class="flow-title">Set a new password</div>
            <div class="flow-sub">Choose something strong — at least 8 characters with a number and a symbol.</div>
            <div class="field-group"><label class="field-label">New password</label><input class="field" type="password" placeholder="Min. 8 characters" style="margin-bottom:0" oninput="updatePwStrength(this)"><div class="password-strength" style="margin-top:6px"><div class="password-strength-bar" id="pw-strength-bar"></div></div></div>
            <div class="field-group" style="margin-top:8px"><label class="field-label">Confirm new password</label><input class="field" type="password" placeholder="Repeat new password" style="margin-bottom:0"></div>
            <button class="btn btn-primary" data-screen="splash" onclick="nav('../auth/splash.html')" style="margin-top:16px">Set password &amp; sign in</button>
          </div>
        </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
