<!DOCTYPE html>
<html lang="en">
<head><base href="/startora-prototype/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Verify WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
  <div class="statusbar" style="background:var(--paper);color:var(--ink-soft)"><span>9:41</span></div>
  <div class="flow-screen">
    <div class="flow-topnav">
      <button class="flow-back" onclick="nav('referral-code.html')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back</button>
      <div class="flow-step-dots"><div class="flow-dot"></div><div class="flow-dot on"></div><div class="flow-dot"></div><div class="flow-dot"></div></div>
    </div>
    <div class="flow-body">
      <div class="flow-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="flow-title">Check your WhatsApp</div>
      <div class="flow-sub">We sent a 6-digit code to <strong>+234 810 ••• 7730</strong></div>
      <div class="otp-row"><div class="otp-box  filled">4</div><div class="otp-box  filled">5</div><div class="otp-box  filled">6</div><div class="otp-box">_</div><div class="otp-box">_</div><div class="otp-box">_</div></div><div class="resend-link">Didn't get it? <span>Resend code</span></div>
      <button class="btn btn-primary" onclick="nav('email-verify.html')">Verify and continue</button>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>

</body>
</html>
