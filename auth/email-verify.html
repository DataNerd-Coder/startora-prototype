<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Verify Email</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="flow-screen">
          <div class="flow-topnav">
            <div class="flow-back" data-screen="whatsapp-verify" onclick="nav('../auth/whatsapp-verify.html')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</div>
            <div class="flow-step-dots"><div class="flow-dot"></div><div class="flow-dot"></div><div class="flow-dot on"></div><div class="flow-dot"></div></div>
          </div>
          <div class="flow-body">
            <div class="flow-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="flow-title">Confirm your email</div>
            <div class="flow-sub">We sent a 6-digit code to<br><strong>chiamaka@kitchenng.com</strong></div>
            <div class="otp-row">
              <div class="otp-box filled">9</div>
              <div class="otp-box filled">2</div>
              <div class="otp-box">_</div>
              <div class="otp-box">_</div>
              <div class="otp-box">_</div>
              <div class="otp-box">_</div>
            </div>
            <div class="resend-link">Didn't receive it? <span>Resend email</span></div>
            <button class="btn btn-primary" data-screen="how-heard" onclick="nav('../auth/how-heard.html')">Verify and continue</button>
          </div>
        </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
