<!DOCTYPE html>
<html lang="en">
<head><base href="/startora-prototype/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — How Did You Hear</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
  <div class="statusbar" style="background:var(--paper);color:var(--ink-soft)"><span>9:41</span></div>
  <div class="flow-screen">
    <div class="flow-topnav">
      <button class="flow-back" onclick="nav('email-verify.html')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back</button>
      <div class="flow-step-dots"><div class="flow-dot"></div><div class="flow-dot"></div><div class="flow-dot"></div><div class="flow-dot on"></div></div>
    </div>
    <div class="flow-body">
      <div class="flow-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <div class="flow-title">Last thing — how did you find us?</div>
      <div class="flow-sub">This helps us understand where Nigerian founders discover Startora.</div>
      <div class="how-chip-row"><div class="how-chip  sel">Referred by another founder</div><div class="how-chip">Instagram or TikTok</div><div class="how-chip">Google Search</div><div class="how-chip">Tech hub or accelerator</div><div class="how-chip">LinkedIn</div><div class="how-chip">Other</div></div>
      <button class="btn btn-primary" onclick="nav('../onboarding/step1.html')">Go to onboarding</button>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
