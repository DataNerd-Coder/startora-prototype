<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="flow-screen">
          <div class="flow-topnav">
            <div class="flow-back" data-screen="splash" onclick="nav('../auth/splash.html')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back to sign in</div>
            <div></div>
          </div>
          <div class="flow-body">
            <div class="flow-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>

            <div class="forgot-form">
              <div class="flow-title">Reset your password</div>
              <div class="flow-sub">Enter the email you registered with. We'll send a reset link immediately.</div>
              <div class="auth-field-group">
                <label class="auth-label">Email address</label>
                <input class="field" placeholder="chiamaka@kitchenng.com" style="margin-bottom:0">
              </div>
              <button class="btn btn-primary" id="send-reset-btn" style="margin-top:8px">Send reset link</button>
            </div>

            <div class="forgot-success">
              <div class="forgot-success-icon" style="width:52px;height:52px;border-radius:50%;background:var(--ledger-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div style="font-family:'Fraunces',serif;font-size:19px;font-weight:500;margin-bottom:8px">Check your email</div>
              <div style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:24px">We sent a reset link to<br><strong>chiamaka@kitchenng.com</strong><br><br>It expires in 15 minutes.</div>
              <button class="btn btn-primary" data-screen="splash" onclick="nav('../auth/splash.html')">Back to sign in</button>
            </div>
          </div>
        </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
