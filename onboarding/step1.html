<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Business Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="topbar">
          <div class="wordmark">START<span>ORA</span></div>
          <div class="topbar-right">
            <div class="ai-mic-btn" data-screen="ai-voice" onclick="nav('../app/ai-voice.html')" style="cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--line);background:var(--paper-raised);margin-right:2px"><svg width="20" height="18" viewBox="0 0 20 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="5" width="3" height="8" rx="1.5" fill="var(--ledger)"/>
  <rect x="4.5" y="2" width="3" height="14" rx="1.5" fill="var(--ledger)"/>
  <rect x="9" y="0" width="3" height="18" rx="1.5" fill="var(--ledger)"/>
  <rect x="13.5" y="2" width="3" height="14" rx="1.5" fill="var(--ledger)"/>
  <rect x="18" y="5" width="2" height="8" rx="1" fill="var(--ledger)"/>
</svg><span class="ai-ask-label">Ask me</span></div>
            <div class="tb-bell" data-screen="notifications" onclick="nav('../app/notifications.html')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="bell-badge"></div></div>
            <div class="avatar" data-screen="profile" onclick="nav('../app/profile.html')">CO</div>
          </div>
        </div>
        <div class="body">
          <div class="step-track"><i class="now"></i><i></i><i></i><i></i></div>
          <div class="ob-eyebrow">Step 1 of 4</div>
          <h2 class="ob-q">What's your business called?</h2>
          <p class="ob-sub">Enter the name exactly as you want it registered. We'll run a name availability check before filing.</p>
          <input class="field" placeholder="e.g. Chiamaka's Kitchen" value="">
          <input class="field" placeholder="Business type (e.g. Food, Tech, Retail)" value="">
          <div style="margin-bottom:16px">
            <div class="ob-eyebrow" style="margin-bottom:10px">Register as</div>
            <div class="chip-row">
              <div class="chip sel">Business Name (BN)</div>
              <div class="chip">Private Limited (Ltd)</div>
            </div>
          </div>
          <button class="btn btn-primary" data-screen="ob-step2" onclick="nav('../onboarding/step2.html')">Continue</button>
          <button class="btn btn-ghost" data-screen="splash" onclick="nav('../auth/splash.html')">Back</button>
        </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
