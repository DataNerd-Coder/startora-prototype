<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Register your business</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body><div class="phone-shell">
<div class="statusbar"><span>9:41</span><span>STARTORA</span></div>
<div class="topbar">
  <div class="wordmark">START<span>ORA</span></div>
  <div class="topbar-right">
    <div class="tb-bell" onclick="nav('../app/notifications.html')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="bell-badge"></div></div>
    <div class="avatar" onclick="nav('../app/profile.html')">CO</div>
  </div>
</div>
<div class="body">
  <div class="back-nav" onclick="nav('../auth/splash.html')" style="cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back</div>
  <div class="step-track"><i class="now"></i><i></i><i></i><i></i></div>
  <div class="ob-eyebrow">Step 1 of 4</div>
  <h2 class="ob-q">What's your business called?</h2>
  <p class="ob-sub">Enter the name exactly as you want it registered. We'll run an availability check before filing.</p>
  <div class="field-group"><label class="field-label">Business name</label><input class="field" placeholder="e.g. Chiamaka's Kitchen"></div>
  <div class="field-group"><label class="field-label">Industry / sector</label><input class="field" placeholder="e.g. Food, Technology, Retail"></div>
  <div class="ob-eyebrow" style="margin-bottom:10px">Register as</div>
  <div class="chip-row">
    <div class="chip sel">Business Name (BN)</div>
    <div class="chip">Private Limited (Ltd)</div>
  </div>
  <button class="btn btn-primary" onclick="nav('step2.html')">Continue</button>
</div>
</div>
<script src="../js/app.js"></script>
</body></html>
