<!DOCTYPE html>
<html lang="en">
<head><base href="/startora-prototype/">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — Mapping obligations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body><div class="phone-shell">
<div class="statusbar"><span>9:41</span><span>STARTORA</span></div>
<div class="topbar">
  <div class="wordmark">START<span>ORA</span></div>
  <div class="topbar-right">
    <div class="tb-bell" onclick="nav('notifications.html')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="bell-badge"></div></div>
    <div class="avatar" onclick="nav('profile.html')">CO</div>
  </div>
</div>
<div class="body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:520px;text-align:center;padding-top:40px">
  <div style="width:64px;height:64px;border-radius:18px;background:var(--ledger-soft);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:22px">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--ledger)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <h2 style="font-family:Fraunces,serif;font-size:22px;font-weight:500;margin:0 0 8px">Mapping your obligations</h2>
  <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 26px;max-width:260px">Startora's AI is cross-referencing your business profile with Nigerian regulatory frameworks.</p>
  <div style="width:100%;max-width:280px;text-align:left;margin-bottom:20px">
    <div class="ai-pulse">
      <div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>
      <div class="ai-text"><strong>Checking CAC requirements</strong> for food businesses in Lagos…</div>
    </div>
  </div>
  <div style="width:100%;max-width:240px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);margin-bottom:6px;font-family:IBM Plex Mono,monospace"><span>Analysing profile</span><span>75%</span></div>
    <div style="height:4px;background:var(--line);border-radius:2px;overflow:hidden"><div style="height:100%;width:75%;background:var(--ledger);border-radius:2px"></div></div>
  </div>
  <p style="font-size:11.5px;color:var(--ink-soft);margin:0 0 28px">Checking NAFDAC scope · NDPR obligations · Trademark window</p>
  <button class="btn btn-primary" onclick="nav('../app/compliance-map.html')" style="max-width:280px;width:100%">See your compliance map</button>
</div>
</div>
<script src="../js/app.js"></script>
</body></html>
