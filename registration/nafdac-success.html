<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Startora — NAFDAC Submitted</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="phone-shell">
<div class="topbar">
          <div class="wordmark">START<span>ORA</span></div>
          <div class="topbar-right">
            <div class="ai-mic-btn" data-screen="ai-voice" onclick="nav('../app/ai-voice.html')" style="cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--line);background:var(--paper-raised);margin-right:2px"><svg width="20" height="18" viewBox="0 0 20 18" fill="none"><rect x="0" y="5" width="3" height="8" rx="1.5" fill="var(--ledger)"/><rect x="4.5" y="2" width="3" height="14" rx="1.5" fill="var(--ledger)"/><rect x="9" y="0" width="3" height="18" rx="1.5" fill="var(--ledger)"/><rect x="13.5" y="2" width="3" height="14" rx="1.5" fill="var(--ledger)"/><rect x="18" y="5" width="2" height="8" rx="1" fill="var(--ledger)"/></svg><span class="ai-ask-label">Ask me</span></div>
            <div class="tb-bell" data-screen="notifications" onclick="nav('../app/notifications.html')" style="cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="bell-badge"></div></div>
            <div class="avatar" data-screen="profile" onclick="nav('../app/profile.html')" style="cursor:pointer">CO</div>
          </div>
        </div>
        <div class="body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;text-align:center;padding:40px 22px">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--ledger-soft);border:2px solid var(--ledger);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px">✓</div>
          <div style="font-family:Fraunces,serif;font-size:22px;font-weight:500;margin-bottom:8px">Payment confirmed</div>
          <div style="font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:28px">₦100,000 received. Your NAFDAC application for Chiamaka's Jollof Paste is now queued. Startora will submit to the NAFDAC e-portal and schedule your facility inspection.</div>
          <button class="btn btn-primary" data-screen="filing" onclick="nav('../app/filing-status.html')" style="width:100%">Track your NAFDAC filing</button>
          <button class="btn btn-ghost" data-screen="dashboard" onclick="nav('../app/dashboard.html')" style="margin-top:10px;width:100%">Back to home</button>
        </div>
        <div class="tabbar"><div data-tab="dashboard" data-screen="dashboard" onclick="nav('../app/dashboard.html')" style="cursor:pointer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></div><div data-tab="filing" data-screen="filing" onclick="nav('../app/filing-status.html')" style="cursor:pointer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Filings</span></div><div data-tab="docs" data-screen="docs" onclick="nav('../app/docs.html')" style="cursor:pointer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Docs</span></div><div class="on" data-tab="services" data-screen="services" onclick="nav('../app/services.html')" style="cursor:pointer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Services</span></div></div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
